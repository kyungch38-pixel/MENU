<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koreden</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('./background.jpg') no-repeat center center/cover;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      padding: 30px 0;
    }

    .container {
      position: relative;
      width: 90%;
      max-width: 380px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      background: url('./backgroundandlogo.jpg') no-repeat center center/cover;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50px;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      z-index: 10;
    }

    .back-btn {
      position: absolute;
      left: 10px;
      text-decoration: none;
      font-size: 20px;
      color: black;
    }

    .content {
      padding: 15px;
      padding-bottom: 80px; /* 하단 여유 */
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .card-img {
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      text-align: center;
      line-height: 1.3;
    }

    .card.empty {
      pointer-events: none;
    }

    .card.empty .card-img {
      background: transparent;
      box-shadow: none;
    }

    .card.empty .card-title {
      display: none;
    }

    /* 🇰🇷 국기 (로고 옆 정렬) */
    .korea-flag-decoration {
      position: absolute;
      bottom: 0px;
      right: 35px; /* 🔥 로고 바로 왼쪽 */
      width: 190px;
      opacity: 0.95;
      pointer-events: none;
      z-index: 1;
    }

    /* 🏷️ 로고 */
    .corner-logo {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 75px;
      z-index: 2;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <a href="menu_website.html" class="back-btn">←</a>
      Koreden
    </div>

    <div class="content">
      <div class="grid">

        <div class="card" onclick="openModal('korea1.jpg')">
          <div class="card-img"><img src="korea1.jpg"></div>
          <div class="card-title">Vegan Kimbap</div>
        </div>

        <div class="card" onclick="openModal('korea2.jpg')">
          <div class="card-img"><img src="korea2.jpg"></div>
          <div class="card-title">Dana Sosisli Kimbap</div>
        </div>

        <div class="card" onclick="openModal('korea3.jpg')">
          <div class="card-img"><img src="korea3.jpg"></div>
          <div class="card-title">Yengeçli Kimbap</div>
        </div>

        <div class="card" onclick="openModal('korea4.jpg')">
          <div class="card-img"><img src="korea4.jpg"></div>
          <div class="card-title">Vegan Ramyon</div>
        </div>

        <div class="card" onclick="openModal('korea5.jpg')">
          <div class="card-img"><img src="korea5.jpg"></div>
          <div class="card-title">Bonfile Ramyon</div>
        </div>

        <div class="card" onclick="openModal('korea6.jpg')">
          <div class="card-img"><img src="korea6.jpg"></div>
          <div class="card-title">Tavuklu Ramyon</div>
        </div>

        <div class="card" onclick="openModal('korea7.jpg')">
          <div class="card-img"><img src="korea7.jpg"></div>
          <div class="card-title">Yangnyeom Tavuk</div>
        </div>

        <div class="card empty"><div class="card-img"></div></div>
        <div class="card empty"><div class="card-img"></div></div>

      </div>
    </div>

    <!-- 🇰🇷 국기 -->
    <img src="./koreaflag.png" class="korea-flag-decoration">

    <!-- 🏷️ 로고 -->
    <img src="./logo.png" class="corner-logo">

  </div>

  <div id="modal" class="modal" onclick="closeModal()">
    <img id="modal-img">
  </div>

  <script>
    function openModal(src) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modal-img").src = src;
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</body>
</html>
