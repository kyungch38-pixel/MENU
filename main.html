<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ana Yemekler</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('./background.jpg') no-repeat center center/cover;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      padding: 30px 0;
    }

    .container {
      position: relative;
      width: 90%;
      max-width: 380px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      background: url('./backgroundandlogo.jpg') no-repeat center center/cover;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50px;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      z-index: 10;
    }

    .back-btn {
      position: absolute;
      left: 10px;
      text-decoration: none;
      font-size: 20px;
      color: black;
    }

    .content {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .card-img {
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      text-align: center;
      line-height: 1.3;
    }

    .card.empty {
      pointer-events: none;
    }

    .card.empty .card-img {
      background: transparent;
      box-shadow: none;
    }

    .card.empty .card-title {
      display: none;
    }

    /* 🌸 꽃 (로고 위쪽 배치) */
    .flower4-decoration {
      position: absolute;
      bottom: 55px;   /* 🔥 로고 위 */
      right: 0px;
      width: 130px;
      opacity: 0.9;
      pointer-events: none;
      z-index: 1;
    }

    /* 🏷️ 로고 */
    .corner-logo {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 75px;
      z-index: 2;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <a href="menu_website.html" class="back-btn">←</a>
      Ana Yemekler
    </div>

    <div class="content">
      <div class="grid">

        <div class="card" onclick="openModal('maindish1.jpg')"><div class="card-img"><img src="maindish1.jpg"></div><div class="card-title">Enginar Beğendili Dana Lokum</div></div>
        <div class="card" onclick="openModal('maindish2.jpg')"><div class="card-img"><img src="maindish2.jpg"></div><div class="card-title">Demi Glace Soslu Bonfile</div></div>
        <div class="card" onclick="openModal('maindish3.jpg')"><div class="card-img"><img src="maindish3.jpg"></div><div class="card-title">Barbekü Soslu Dana Pirzola</div></div>

        <div class="card" onclick="openModal('maindish4.jpg')"><div class="card-img"><img src="maindish4.jpg"></div><div class="card-title">Kremalı Mantarlı Dana Bonfile</div></div>
        <div class="card" onclick="openModal('maindish5.jpg')"><div class="card-img"><img src="maindish5.jpg"></div><div class="card-title">Kuzu Külbastı</div></div>
        <div class="card" onclick="openModal('maindish6.jpg')"><div class="card-img"><img src="maindish6.jpg"></div><div class="card-title">İtalyan Usulü Osso Buco</div></div>

        <div class="card" onclick="openModal('maindish7.jpg')"><div class="card-img"><img src="maindish7.jpg"></div><div class="card-title">Kuzu Pirzola</div></div>
        <div class="card" onclick="openModal('maindish8.jpg')"><div class="card-img"><img src="maindish8.jpg"></div><div class="card-title">Izgara Tiger Karides</div></div>
        <div class="card" onclick="openModal('maindish9.jpg')"><div class="card-img"><img src="maindish9.jpg"></div><div class="card-title">Izgara Fileto Levrek</div></div>

        <div class="card" onclick="openModal('maindish10.jpg')"><div class="card-img"><img src="maindish10.jpg"></div><div class="card-title">Izgara Somon</div></div>
        <div class="card" onclick="openModal('maindish11.jpg')"><div class="card-img"><img src="maindish11.jpg"></div><div class="card-title">Sebzeli Orkinos Şiş</div></div>

        <div class="card empty"><div class="card-img"></div></div>

      </div>
    </div>

    <!-- 🌸 꽃 -->
    <img src="./whiteflower4.png" class="flower4-decoration">

    <!-- 🏷️ 로고 -->
    <img src="./logo.png" class="corner-logo">

  </div>

  <div id="modal" class="modal" onclick="closeModal()">
    <img id="modal-img">
  </div>

  <script>
    function openModal(src) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modal-img").src = src;
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</body>
</html>
